{% extends "internal/base.html" %}
{% block content %}
<h2>Audit logs</h2>
<table>
  <tr><th>Time</th><th>Actor</th><th>Action</th><th>Entity</th></tr>
  {% for log in logs %}
    <tr><td>{{ log.created_at }}</td><td>{{ log.actor_type }} {{ log.actor_id or "" }}</td><td>{{ log.action }}</td><td>{{ log.entity_type }} {{ log.entity_id or "" }}</td></tr>
  {% endfor %}
</table>
{% endblock %}
