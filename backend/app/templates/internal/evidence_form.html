{% extends "internal/base.html" %}
{% block content %}
<h2>Edit evidence</h2>
<p class="muted">For commitment: {{ commitment.title }}</p>
<form method="post" action="/internal/programs/commitments/{{ commitment.id }}/evidence/{{ evidence.id }}/edit" class="stack">
  <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
  <label>Title <input name="title" value="{{ evidence.title }}" required></label>
  <label>URL <input name="url" value="{{ evidence.url if evidence.url else '' }}"></label>
  <label>Source type
    <select name="source_type">
      {% for key, label in evidence_source_types.items() %}
        <option value="{{ key }}" {% if evidence.source_type == key %}selected{% endif %}>{{ label }}</option>
      {% endfor %}
    </select>
  </label>
  <label>Publisher <input name="publisher" value="{{ evidence.publisher if evidence.publisher else '' }}"></label>
  <label>Published date <input type="date" name="published_at" value="{{ evidence.published_at if evidence.published_at else '' }}"></label>
  <label>Relevant excerpt <textarea name="quote_or_relevant_excerpt">{{ evidence.quote_or_relevant_excerpt if evidence.quote_or_relevant_excerpt else '' }}</textarea></label>
  <label>Description <textarea name="description">{{ evidence.description if evidence.description else '' }}</textarea></label>
  <label>Evidence relation
    <select name="relation_type">
      {% for relation in ["supports_status", "contradicts_status", "contextualizes", "proves_completion", "proves_delay", "proves_violation", "supports_contribution", "contradicts_contribution", "background"] %}
        <option value="{{ relation }}" {% if evidence.relation_type == relation %}selected{% endif %}>{{ relation }}</option>
      {% endfor %}
    </select>
  </label>
  <label>Роля на източника
    <select name="evidence_role">
      <option value="">Не е зададена</option>
      {% for key, label in evidence_roles.items() %}
        <option value="{{ key }}" {% if evidence.evidence_role == key %}selected{% endif %}>{{ label }}</option>
      {% endfor %}
    </select>
  </label>
  <label>Сила на доказателството
    <select name="evidence_strength">
      <option value="">Не е зададена</option>
      {% for key, label in evidence_strengths.items() %}
        <option value="{{ key }}" {% if evidence.evidence_strength == key %}selected{% endif %}>{{ label }}</option>
      {% endfor %}
    </select>
  </label>
  <label class="checkbox-row"><input type="checkbox" name="is_self_reported" value="1" {% if evidence.is_self_reported %}checked{% endif %}> Самоотчетен източник</label>
  <label class="checkbox-row"><input type="checkbox" name="is_independent_confirmation" value="1" {% if evidence.is_independent_confirmation %}checked{% endif %}> Независимо потвърждение</label>
  <label class="checkbox-row"><input type="checkbox" name="is_contradictory" value="1" {% if evidence.is_contradictory %}checked{% endif %}> Противоречив източник</label>
  <label class="checkbox-row"><input type="checkbox" name="is_disproven" value="1" {% if evidence.is_disproven %}checked{% endif %}> Опроверган източник</label>
  <label>Ограничения <textarea name="limitations">{{ evidence.limitations if evidence.limitations else '' }}</textarea></label>
  <button type="submit">Save evidence</button>
</form>
{% endblock %}
