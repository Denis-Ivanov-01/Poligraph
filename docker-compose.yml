services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: politic_bs_filter
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app_user -d politic_bs_filter"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

  backend:
    build: ./backend
    command: sh -c "alembic upgrade head && uvicorn app.main:app --reload --host 0.0.0.0 --port 8000"
    environment:
      DATABASE_URL: postgresql+psycopg://app_user:password@postgres:5432/politic_bs_filter
      REDIS_URL: redis://redis:6379/0
      APP_ENV: development
      APP_SECRET_KEY: change-this-development-secret
      SESSION_COOKIE_NAME: politic_bs_session
      ROOT_ADMIN_USERNAME: admin
      ROOT_ADMIN_PASSWORD_HASH: plain:admin
      ROOT_ADMIN_ENABLED: "true"
      PUBLIC_BASE_URL: http://localhost:5173
      BACKEND_BASE_URL: http://localhost:8000
      MEDIA_STORAGE_PATH: ./media
      CORS_ALLOWED_ORIGINS: http://localhost:5173
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./backend/app:/app/app
      - ./backend/alembic:/app/alembic
      - ./backend/alembic.ini:/app/alembic.ini
      - media_data:/app/media

  frontend:
    build: ./frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api
      VITE_PUBLIC_BASE_URL: http://localhost:5173
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.ts:/app/vite.config.ts
      - ./frontend/tsconfig.json:/app/tsconfig.json

volumes:
  postgres_data:
  redis_data:
  media_data:
